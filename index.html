<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>huiwu.com — 身份验证</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#f8f9fd 0%,#eef2f8 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;-webkit-tap-highlight-color:transparent}
    .page{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
    .panel{text-align:center;width:min(360px,85vw);padding:40px 32px;border-radius:24px;background:#f6f7fb;box-shadow:12px 12px 24px rgba(0,0,0,.08),-12px -12px 24px rgba(255,255,255,.9);animation:fadeUp .5s ease}
    .panel .icon{margin-bottom:16px;display:inline-flex;width:52px;height:52px;border-radius:16px;background:linear-gradient(135deg,#9bb3ff,#7b94ff);align-items:center;justify-content:center;opacity:.85}
    .panel .icon svg{width:24px;height:24px;color:#fff}
    .panel h1{font-size:20px;font-weight:600;letter-spacing:.3px;color:#2d3047;margin-bottom:4px}
    .panel .sub{font-size:11px;color:#8a8fa8;letter-spacing:.5px;margin-bottom:24px}
    .panel input{width:100%;padding:12px 16px;font-size:15px;border:none;border-radius:14px;text-align:center;outline:none;background:#f6f7fb;box-shadow:inset 3px 3px 7px rgba(0,0,0,.06),inset -3px -3px 7px rgba(255,255,255,.9);color:#2d3047;letter-spacing:1px;transition:box-shadow .4s}
    .panel input:focus{box-shadow:inset 3px 3px 7px rgba(123,148,255,.12),inset -3px -3px 7px rgba(255,255,255,.9)}
    .panel input::placeholder{color:rgba(138,143,168,.35)}
    .panel button{width:100%;padding:12px;margin-top:16px;font-size:14px;font-weight:600;letter-spacing:.5px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#9bb3ff,#7b94ff);color:#fff;opacity:.85;transition:transform .4s ease,opacity .4s ease,box-shadow .4s ease;box-shadow:3px 3px 8px rgba(123,148,255,.15)}
    .panel button:hover{transform:translateY(-2px);opacity:1}.panel button:active{transform:scale(.97)}
    .panel .err{color:#e05555;font-size:12px;margin-top:12px;display:none;animation:fadeUp .4s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="page">
    <div class="panel">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <h1>huiwu.com</h1>
      <div class="sub">身份验证</div>
      <input type="password" id="gk" placeholder="输入访问密钥" autofocus />
      <button id="gb">验证进入</button>
      <div class="err" id="ge"></div>
    </div>
  </div>
  <script>
    const AUTH_FN_URL='https://wwqqvfnuxpddhgwuwiut.supabase.co/functions/v1/smart-handler';
    const AUTH_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3cXF2Zm51eHBkZGhnd3V3aXV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzAwNDcsImV4cCI6MjA5NjI0NjA0N30.eCfxc2WeXkpJiMXRCzydwmFE3Z6UMk3aqOdrhdzZbug';

    if(!sessionStorage.getItem('passed_gate')){window.location.href='gate.html'}
    (function(){const s=localStorage.getItem('huiwu_session');if(s){try{const{time}=JSON.parse(s);if(Date.now()-time<259200000){window.location.href='main.html';return}}catch(_){}}})();

    document.getElementById('gb').onclick=async()=>{
      const k=document.getElementById('gk').value.trim();if(!k)return;
      const btn=document.getElementById('gb'),err=document.getElementById('ge');
      btn.textContent='验证中…';btn.disabled=true;err.style.display='none';
      try{const r=await fetch(AUTH_FN_URL,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+AUTH_ANON_KEY},body:JSON.stringify({key:k})});const d=await r.json();
        if(d.valid){localStorage.setItem('huiwu_session',JSON.stringify({session:d.session,time:Date.now()}));localStorage.setItem('verified','true');setTimeout(()=>{window.location.href='/main.html'},500)}
        else{err.textContent='密钥错误';err.style.display='block'}
      }catch(_){err.textContent='网络连接失败';err.style.display='block'}
      btn.textContent='验证进入';btn.disabled=false;
    };
  </script>
</body>
</html>
