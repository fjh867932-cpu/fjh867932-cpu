<!DOCTYPE html>
<html lang="zh-CN">
  <script>
    // 强制检查：防止绕过验证直接访问主站
    // 如果你已有的 登录状态 或 Token 变量名不同，可以在此处加到并集条件中
    if (!localStorage.getItem("verified")) {
        window.location.href = "/index.html";
    }
</script>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>huiwu.com</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="navbar" class="navbar">
    <button id="nav-back" class="nav-back" title="返回">←</button>
    <span id="nav-title" class="nav-title">huiwu.com</span>
    <span class="nav-spacer"></span>
  </nav>
  <main id="view" class="view"></main>

  <template id="tpl-wall">
    <div class="wall">
      <div class="wall-content">
        <div class="wall-bg"></div>
        <div class="notes-layer"></div>
      </div>
      <div class="create-hint">✨ 点击此处贴一张便签</div>
      <div class="toolbar collapsed">
        <label class="tool-btn" title="更换背景图片">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <span>背景</span>
          <input type="file" class="bg-input" accept="image/*" hidden>
        </label>
        <span class="tool-divider"></span>
        <span class="tool-note-count">0 张便签</span>
      </div>
      <div class="float-btns">
        <button class="float-btn float-btn-pan" title="移动/缩放模式"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3"/></svg></button>
        <button class="float-btn float-btn-add" title="添加便签模式"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button class="float-btn float-btn-tool" title="展开工具栏"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg></button>
      </div>
    </div>
  </template>

  <template id="tpl-chat">
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages"><div class="chat-empty">👋 有什么学习问题问我？</div></div>
      <div class="chat-input-area">
        <textarea class="chat-input" id="chatInput" rows="2" placeholder="输入你的问题…"></textarea>
        <button class="chat-send-btn" id="chatSendBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
      </div>
      <div class="chat-status" id="chatStatus"><span>本次：—</span><span>今日：—</span><span>剩余：未知</span></div>
    </div>
  </template>

  <script>
    // 门禁检查
    if(!localStorage.getItem('verified')){window.location.href='/index.html'}
  </script>
  <script src="app.js"></script>
</body>
</html>
