<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>huiwu.com</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;background:linear-gradient(180deg,#f8f9fd 0%,#eef2f8 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:48px}
    .rings{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
    .ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;border:1.5px solid;animation:spin linear infinite}
    .ring:nth-child(1){width:min(240px,55vw);height:min(240px,55vw);border-color:rgba(123,148,255,.12);animation-duration:35s}
    .ring:nth-child(2){width:min(320px,70vw);height:min(320px,70vw);border-color:rgba(123,148,255,.08);animation-direction:reverse;animation-duration:45s}
    .ring:nth-child(3){width:min(160px,40vw);height:min(160px,40vw);border-color:rgba(123,148,255,.15);animation-duration:25s}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    .core{position:relative;z-index:10;text-align:center;animation:fadeUp .8s ease}
    .core .icon{margin-bottom:20px;display:inline-block}
    .core .icon svg{width:56px;height:56px;color:#7b94ff;opacity:.7}
    .core h1{font-size:clamp(26px,5vw,36px);font-weight:600;letter-spacing:.15em;color:#2d3047;margin-bottom:6px}
    .core .tag{font-size:clamp(11px,1.5vw,13px);color:#8a8fa8;letter-spacing:.25em;margin-bottom:56px}
    .core .hint{font-size:12px;color:rgba(123,148,255,.5);letter-spacing:.1em;animation:breathe 3s ease-in-out infinite}
    @keyframes breathe{0%,100%{opacity:.4}50%{opacity:.9}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .flash{position:fixed;inset:0;background:#fff;z-index:999;opacity:0;pointer-events:none;transition:opacity .6s ease}
    .flash.go{opacity:.9;transition:opacity .3s ease}
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="rings">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    </div>
    <div class="core">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="3" y="3" width="18" height="18" rx="4"/>
          <circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/>
        </svg>
      </div>
      <h1>huiwu.com</h1>
      <div class="tag">Private Digital Workspace</div>
      <div class="hint">触碰以进入</div>
    </div>
  </div>
  <div class="flash" id="flash"></div>
  <script>
    document.getElementById('gate').addEventListener('click',()=>{
      sessionStorage.setItem('passed_gate','true');
      document.getElementById('flash').classList.add('go');
      setTimeout(()=>{window.location.href='/index.html'},500);
    });
  </script>
</body>
</html>
