<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NorthFrame</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:"Segoe UI",sans-serif;
    cursor:pointer;
}

/* 背景 */

.background{
    position:fixed;
    inset:0;

    background-image:url("assets/gate-bg.jpg");

    background-size:cover;
    background-position:center center;
    background-repeat:no-repeat;

    transform:scale(1.05);

    animation:slowZoom 25s ease-in-out infinite alternate;
}

/* 暗化层 */

.overlay{
    position:fixed;
    inset:0;

    background:
    linear-gradient(
        rgba(0,0,0,.55),
        rgba(0,0,0,.35),
        rgba(0,0,0,.65)
    );

    backdrop-filter:blur(2px);
}

/* 内容 */

.content{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    text-align:center;

    z-index:10;

    width:90%;
}

.logo{

    font-size:clamp(40px,7vw,90px);

    font-weight:700;

    color:white;

    letter-spacing:10px;

    text-shadow:
    0 0 20px #8ec5ff,
    0 0 40px #6aa7ff;

    animation:breathe 4s ease infinite;
}

.subtitle{

    margin-top:18px;

    font-size:clamp(14px,2vw,22px);

    color:rgba(255,255,255,.75);

    letter-spacing:4px;
}

.enter{

    margin-top:50px;

    font-size:14px;

    color:rgba(255,255,255,.6);

    letter-spacing:3px;

    animation:flash 2.5s infinite;
}

.corner{

    position:fixed;

    bottom:30px;
    left:50%;

    transform:translateX(-50%);

    color:rgba(255,255,255,.4);

    font-size:12px;

    letter-spacing:2px;
}

/* 淡出 */

.fadeout{
    animation:fadeOut .9s forwards;
}

@keyframes breathe{

    0%{
        opacity:.8;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.8;
    }
}

@keyframes flash{

    50%{
        opacity:.3;
    }
}

@keyframes slowZoom{

    from{
        transform:scale(1.05);
    }

    to{
        transform:scale(1.15);
    }
}

@keyframes fadeOut{

    to{
        opacity:0;
        transform:scale(1.03);
    }
}

/* 手机优化 */

@media (max-width:768px){

    .logo{
        letter-spacing:5px;
    }

    .subtitle{
        font-size:14px;
    }
}

</style>
</head>

<body>

<div class="background" id="bg"></div>

<div class="overlay" id="overlay"></div>

<div class="content" id="content">

    <div class="logo">
        Continue
    </div>

    <div class="subtitle">
        灵感非努力可得
    </div>

    <div class="enter">
        点击屏幕继续

    </div>

</div>

<div class="corner">
    give me enough time
</div>

<script>

document.body.addEventListener("click",()=>{

    // 标记已通过大门，避免 index.html 回跳
    sessionStorage.setItem('passed_gate', '1');

    document.body.classList.add("fadeout");

    setTimeout(()=>{

        window.location.href="index.html";

    },900);

});

</script>

</body>
</html>
